<!DOCTYPE html>
<html>
<head>
    <title>Detail Report</title>
</head>
<body>
    <h1>Detail Laporan</h1>

    <h2>{{ report.title }}</h2>
    <p><b>Kategori:</b> {{ report.category }}</p>
    <p><b>Deskripsi:</b> {{ report.description }}</p>
    <p><b>Lokasi:</b> {{ report.location }}</p>
    <p><b>Status:</b> {{ report.get_status_display }}</p>
    <p><b>Dibuat:</b> {{ report.created_at }}</p>

    <a href="{% url 'report_list' %}">Kembali</a>
</body>
</html>
