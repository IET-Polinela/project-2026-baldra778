<!DOCTYPE html>
<html>
<head>
    <title>Smart City Issue Reporting</title>
</head>
<body>
    <h1>Daftar Laporan Masalah Kota</h1>

    <a href="{% url 'add_report' %}">Tambah Laporan</a>
    <hr>

    {% for report in reports %}
        <h3>{{ report.title }}</h3>
        <p><b>Kategori:</b> {{ report.category }}</p>
        <p><b>Deskripsi:</b> {{ report.description }}</p>
        <p><b>Lokasi:</b> {{ report.location }}</p>
        <p><b>Status:</b> {{ report.status }}</p>

        <a href="{% url 'edit_report' report.id %}">Edit</a>
        <a href="{% url 'delete_report' report.id %}">Delete</a>
        <hr>
    {% empty %}
        <p>Belum ada laporan.</p>
    {% endfor %}
</body>
</html>
