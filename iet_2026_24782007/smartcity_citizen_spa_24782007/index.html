<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Portal Warga Smart City Tracker</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
    <style>
        body { background-color: #f4f6f9; }
        .spa-container { min-height: calc(100vh - 80px); }
    </style>
</head>
<body>
 
    <nav class="navbar navbar-expand-lg navbar-dark bg-primary shadow-sm">
        <div class="container-fluid px-4">
            <a class="navbar-brand fw-bold" href="#home">
                <i class="bi bi-buildings-fill me-2"></i>Smart City Portal
            </a>
            <div id="nav-menus" class="ms-auto d-flex align-items-center gap-2">
                <span id="authStatusLabel" class="badge bg-light text-dark">Belum Login</span>
                <a id="navLoginBtn" class="btn btn-outline-light btn-sm" href="#login">Masuk</a>
                <a id="navRegisterBtn" class="btn btn-light btn-sm" href="#register">Daftar</a>
                <button id="navLogoutBtn" type="button" class="btn btn-outline-light btn-sm d-none" onclick="logoutUser()">Keluar</button>
            </div>
        </div>
    </nav>
 
    <main class="container-fluid px-4 mt-4 spa-container" id="app-content"></main>
 
    <!-- Bootstrap Modal: Form Laporan Warga -->
    <!-- Tombol aksi WAJIB type="button" agar tidak memicu reload bawaan HTML form -->
    <div class="modal fade" id="reportModal" tabindex="-1" aria-labelledby="reportModalLabel" aria-hidden="true">
        <div class="modal-dialog modal-dialog-centered">
            <div class="modal-content border-0 shadow">
                <div class="modal-header bg-primary text-white">
                    <h5 class="modal-title fw-bold" id="reportModalLabel">
                        <i class="bi bi-pencil-square me-2"></i>Form Laporan Warga
                    </h5>
                    <button type="button" class="btn-close btn-close-white" data-bs-dismiss="modal" aria-label="Close"></button>
                </div>
                <div class="modal-body p-4">
                    <form id="reportForm">
                        <!-- Field tersembunyi untuk menyimpan ID saat mode edit -->
                        <input type="hidden" id="reportId">
 
                        <!-- 1. Field Judul -->
                        <div class="mb-3">
                            <label for="reportTitle" class="form-label fw-semibold">Judul Laporan</label>
                            <input type="text" class="form-control" id="reportTitle"
                                   placeholder="Contoh: Jalan berlubang di Jl. Sudirman" required>
                        </div>
 
                        <!-- 2. Field Deskripsi -->
                        <div class="mb-3">
                            <label for="reportDescription" class="form-label fw-semibold">Deskripsi / Keluhan</label>
                            <textarea class="form-control" id="reportDescription" rows="4"
                                      placeholder="Jelaskan detail permasalahan yang terjadi..." required></textarea>
                        </div>
 
                        <!-- 3. Field Lokasi -->
                        <div class="mb-3">
                            <label for="reportLocation" class="form-label fw-semibold">Lokasi</label>
                            <input type="text" class="form-control" id="reportLocation"
                                   placeholder="Contoh: Jl. Sudirman No. 10, Palembang" required>
                        </div>
 
                        <!-- 4. Field Kategori -->
                        <div class="mb-3">
                            <label for="reportCategory" class="form-label fw-semibold">Kategori</label>
                            <select class="form-select" id="reportCategory">
                                <option value="Infrastruktur">Infrastruktur</option>
                                <option value="Kebersihan">Kebersihan</option>
                                <option value="Keamanan">Keamanan</option>
                                <option value="Layanan Publik">Layanan Publik</option>
                                <option value="Lainnya">Lainnya</option>
                            </select>
                        </div>
 
                        <!-- 5. Field Status -->
                        <div class="mb-3">
                            <label for="reportStatus" class="form-label fw-semibold">Status Pengajuan</label>
                            <select class="form-select" id="reportStatus">
                                <option value="DRAFT">Simpan sebagai Draft</option>
                                <option value="REPORTED">Ajukan Laporan (Reported)</option>
                            </select>
                        </div>

                        <!-- 6. Verifikasi data laporan -->
                        <div class="border rounded p-3 bg-light-subtle">
                            <div class="form-check">
                                <input class="form-check-input" type="checkbox" id="reportVerify" required>
                                <label class="form-check-label small text-secondary" for="reportVerify">
                                    Saya telah memeriksa kelengkapan dan kebenaran data laporan sebelum disimpan.
                                </label>
                            </div>
                            <div class="small text-muted mt-2">
                                Verifikasi ini membantu memastikan laporan yang dikirim valid dan siap diproses.
                            </div>
                        </div>
                    </form>
                </div>
                <!-- Tombol aksi: WAJIB type="button", bukan type="submit" -->
                <div class="modal-footer d-flex justify-content-between">
                    <button type="button" class="btn btn-outline-secondary" data-bs-dismiss="modal">
                        <i class="bi bi-x-circle me-1"></i>Batal
                    </button>
                    <button type="submit" id="btnSubmitReport" form="reportForm" class="btn btn-primary fw-bold">
                        <i class="bi bi-send-fill me-1"></i>Simpan Laporan
                    </button>
                </div>
            </div>
        </div>
    </div>
 
    <!-- Urutan script: api.js harus paling atas, bootstrap paling bawah -->
    <script src="js/api.js"></script>
    <script src="js/auth.js"></script>
    <script src="js/router.js"></script>
    <script src="js/app.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
 
</body>
</html>
