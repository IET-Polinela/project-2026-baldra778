{% extends 'base.html' %}

{% block title %}Daftar Akun - Kemiling City{% endblock %}

{% block content %}
<div class="row justify-content-center">
    <div class="col-md-5">
        <div class="card shadow">
            <div class="card-header bg-primary text-white text-center">
                <h4 class="mb-0"><i class="bi bi-person-plus"></i> Daftar Akun Citizen</h4>
            </div>
            <div class="card-body p-4">
                <form method="post">
                    {% csrf_token %}
                    {% for field in form %}
                        <div class="mb-3">
                            <label for="{{ field.id_for_label }}" class="form-label fw-semibold">
                                {{ field.label }}
                            </label>
                            <input
                                type="{{ field.field.widget.input_type }}"
                                name="{{ field.html_name }}"
                                id="{{ field.id_for_label }}"
                                class="form-control {% if field.errors %}is-invalid{% endif %}"
                                {% if field.value %}value="{{ field.value }}"{% endif %}
                            >
                            {% for error in field.errors %}
                                <div class="invalid-feedback">{{ error }}</div>
                            {% endfor %}
                        </div>
                    {% endfor %}
                    <div class="d-grid mt-3">
                        <button type="submit" class="btn btn-primary">
                            <i class="bi bi-check-circle"></i> Daftar Sekarang
                        </button>
                    </div>
                </form>
            </div>
            <div class="card-footer text-center text-muted">
                Sudah punya akun? <a href="{% url 'login' %}">Login di sini</a>
            </div>
        </div>
    </div>
</div>
{% endblock %}
